version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: thai-binh-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-thai_binh}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-thai_binh_dev}
      POSTGRES_DB: ${DB_NAME:-thai_binh_training}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-thai_binh} -d ${DB_NAME:-thai_binh_training}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - thai-binh-network

  redis:
    image: redis:7-alpine
    container_name: thai-binh-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - thai-binh-network

volumes:
  postgres_data:
  redis_data:

networks:
  thai-binh-network:
    driver: bridge
